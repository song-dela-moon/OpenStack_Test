---
# =============================================================================
# kolla-ansible globals.yml
# OpenStack 2024.2 (Dalmatian) on Ubuntu 22.04
# Control Node: 172.21.33.67
# =============================================================================

# --- Basic Settings ----------------------------------------------------------
kolla_base_distro: "ubuntu"
openstack_release: "2024.2"
kolla_internal_vip_address: "172.21.33.100"   # OpenStack API 및 대시보드 접근용 VIP

# --- Network Interfaces -----------------------------------------------------
# 관리/API 네트워크 (사용자가 수동 설정한 br-ex 사용)
network_interface: "br-ex"

# Neutron 외부 (Provider/FIP) 네트워크 인터페이스
# 호스트 Netplan에서 br-ex를 OVS 타입으로 생성했으므로, 다시 물리 포트명을 지정합니다.
neutron_external_interface: "enp5s0f1"

# ── HAProxy / Keepalived ───────────────────────────────────────────────────────
# OpenStack VIP(100)를 관리하고 부여하기 위해 HAProxy/Keepalived 활성화
enable_haproxy: "yes"

# --- Nova (Compute) ---------------------------------------------------------
# KVM 하드웨어 가속 지원 시 kvm, 없으면 qemu
# 확인: kvm-ok 명령어로 판별
nova_compute_virt_type: "kvm"

# Compute 노드 추가를 위한 SSH 활성화
enable_nova_ssh: "yes"

# --- Neutron (Networking) ----------------------------------------------------
enable_neutron_provider_networks: "yes"

# --- Service Enablement ------------------------------------------------------
enable_glance: "yes"       # 이미지 서비스
enable_heat: "yes"         # 오케스트레이션
enable_horizon: "yes"      # 웹 대시보드
enable_nova: "yes"         # 컴퓨트
enable_neutron: "yes"      # 네트워킹
enable_cinder: "yes"       # 블록 스토리지 (sdb 2.7TB LVM 사용)

# --- Cinder LVM Settings -----------------------------------------------------
# 01_deploy_aio.sh에서 sdb에 LVM VG 'cinder-volumes' 자동 생성
enable_cinder_backend_lvm: "yes"
cinder_volume_group: "cinder-volumes"

# --- Database Settings (AIO Optimized) ---------------------------------------
mariadb_expected_num_nodes: 1     # AIO 환경에서 동기화 대기 방지
database_port: 3306               # HAProxy 미사용 시 기본 포트 명시
mariadb_bind_address: "0.0.0.0"   # 모든 인터페이스 바인딩 (로컬 접속 원활화)
enable_proxysql: "no"             # AIO 환경에서 MariaDB와의 포트(3306) 충돌 방지

# --- Optional Services -------------------------------------------------------
enable_barbican: "no"      # 시크릿 관리
enable_octavia: "no"       # 로드밸런서
enable_designate: "no"     # DNS
